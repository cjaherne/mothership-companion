version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -E '^(SESSION_SECRET|ADMIN_PASSWORD|ADMIN_USERNAME|OPENAI_API_KEY|REPLICATE_API_TOKEN)=' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
